version: '3.8'

services:
  mongo:
    image: mongo:6
    restart: always
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/bank_app
      - SECRET_KEY=supersecretkey
    depends_on:
      - mongo

  transactions:
    build:
      context: ./transactions
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - PORT=3000
    depends_on:
      - mongo

  studentportfolio:
    build:
      context: ./studentportfolio
      dockerfile: Dockerfile
    expose:
      - "80"
    depends_on:
      - backend
      - transactions

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - transactions
      - studentportfolio

volumes:
  mongo_data:
